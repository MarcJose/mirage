name: 🐛 Bug Report
description: Report a bug in the mirage project
labels: [bug]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug (will become part of the commit/changelog).
      placeholder: "parser: fails on empty mirrorlist"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `mirage --latest 10`
        2. Observe error message
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "Mirrorlist should be generated without error"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "Program panics with `unwrap()` error"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      placeholder: "OS version, Rust version, logs..."
