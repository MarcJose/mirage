# Configuration file for mirage systemd service
# This file uses the standard mirage configuration format
#
# Configure default arguments for automatic mirror updates
# These settings provide a balanced configuration suitable for most users

# Default mirror selection criteria - adjust based on your preferences and location
--country Germany
--protocol https
--ipv6
--ipv4
--age 12
--completion-percent 100
--fastest 10
--sort score
--verbose
